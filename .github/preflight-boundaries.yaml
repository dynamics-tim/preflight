# .github/preflight-boundaries.yaml
# Generated by preflight v2.0.0. Hand-edit freely — preflight respects the managed markers.
# Docs: https://github.com/dynamics-tim/preflight#guardrails
# <!-- managed-by: preflight -->

version: 1
preset: balanced              # strict | balanced | permissive | custom
mode: enforce                 # enforce | warn | dryrun

tools:
  blocked: []                 # tools denied outright
  ask: []           # tools that require confirmation each call
  allowed: []                 # if non-empty: only these tools run without confirmation

commands:
  blocked:
    - { pattern: 'rm\s+-rf\s+/', reason: 'Recursive root delete' }
    - { pattern: 'curl[^|]*\|\s*(sh|bash)', reason: 'Pipe-to-shell from network' }
    - { pattern: 'git\s+push.*--force(?!-with-lease)', reason: 'Force push without lease' }
    - { pattern: 'dd\s+if=', reason: 'Block device write' }
    - { pattern: 'mkfs(\.\w+)?\b', reason: 'Filesystem format' }
    - { pattern: 'git\s+filter-branch', reason: 'History rewrite' }
    - { pattern: 'git\s+reset\s+--hard\s+origin/(main|master|develop)', reason: 'Hard reset on protected branch' }
  warn:
    - { pattern: 'sudo\b', reason: 'Privilege escalation — review carefully' }
    - { pattern: 'git\s+clean\s+-fdx', reason: 'Clean including ignored files' }

paths:
  protected: ['.env', '.env.*', 'secrets/**', '**/credentials.*', '**/.git/**', '.github/preflight-boundaries.yaml']
  readOnly:  []
  sandbox:   []               # if non-empty: writes only allowed inside

network:
  mode: open                  # allowlist | denylist | open
  allow: []
  deny:  []

onViolation:
  message: 'Blocked by preflight policy: ${reason}'
  log: true

# <!-- end-managed-by: preflight -->

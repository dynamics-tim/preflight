commands:
  blocked:
    # CI envs set CI=true; block npm publish anywhere else
    - { pattern: '(?<!CI=true\s)npm\s+publish\b', reason: 'npm publish outside CI' }
  warn:
    - { pattern: 'rm\s+-rf\s+node_modules', reason: 'node_modules wipe — confirm intent' }
paths:
  readOnly: ['package-lock.json']
